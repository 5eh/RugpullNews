services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rugpullnews
      POSTGRES_USER: rugpull
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rugpull -d rugpullnews"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rugpull:${POSTGRES_PASSWORD:-changeme}@db:5432/rugpullnews
      DATABASE_SSL: "false"
      CMC_API_KEY: ${CMC_API_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://rugpull:${POSTGRES_PASSWORD:-changeme}@db:5432/rugpullnews
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ETH_RPC_URL: ${ETH_RPC_URL:-}
      BSC_RPC_URL: ${BSC_RPC_URL:-}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
